services:
  postgres:
    image: postgres:17
    container_name: manga-postgres
    environment:
      POSTGRES_DB: manga
      POSTGRES_USER: manga
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in a local .env file}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manga -d manga"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: manga-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  nats:
    image: nats:2
    container_name: manga-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  minio:
    image: minio/minio:latest
    container_name: manga-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in a local .env file}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in a local .env file}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: manga-meilisearch
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY in a local .env file}
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

volumes:
  postgres-data:
  redis-data:
  nats-data:
  minio-data:
  meili-data:
